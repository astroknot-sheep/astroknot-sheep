name: Update README

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'   # runs daily at midnight UTC
  workflow_dispatch:        # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silences Node.js 20 deprecation warning

jobs:
  update-readme:
    name: Refresh profile README
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rewrites the "last updated" line in README.md with today's date.
      # If you don't have that line, this step is a no-op — safe to keep.
      - name: Stamp last-updated date
        run: |
          TIMESTAMP="last updated: $(date +'%B %Y, sometime after midnight')"
          sed -i "s|last updated:.*|${TIMESTAMP}|g" README.md

      - name: Commit and push if changed
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: auto-stamp README date [skip ci]"
          git push
